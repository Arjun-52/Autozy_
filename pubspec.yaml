name: autozy
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  http: ^1.1.0
  provider: ^6.0.5
  go_router: ^14.2.0
  flutter_svg: ^2.2.4
  image_picker: ^1.0.7
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # App Launcher Icons
  flutter_launcher_icons: ^0.13.1

  # Code Generation
  retrofit_generator: ^4.0.3+1
  build_runner: ^2.4.8
  json_serializable: ^6.7.1

  # Splash Screen
  flutter_native_splash: ^2.4.7


flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/new-logo.png"


flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icon.png 
    - assets/images/new-logo.png     

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700


flutter_native_splash:
  color: "#FFFFFF"
  image: assets/logo.png
  android: true
  ios: true